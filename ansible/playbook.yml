---
- name: Install CachyOS recovery tooling
  hosts: localhost
  become: true
  vars:
    install_dir: /usr/local/bin
    scripts:
      - { src: list-snapshots.sh, dest: cachyos-list-snapshots }
      - { src: recover.sh,        dest: cachyos-recover }

  tasks:
    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Deploy recovery scripts
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/{{ item.src }}"
        dest: "{{ install_dir }}/{{ item.dest }}"
        mode: '0755'
        owner: root
        group: root
      loop: "{{ scripts }}"

    - name: Ensure required tools are installed
      ansible.builtin.package:
        name:
          - cryptsetup
          - btrfs-progs
          - util-linux
        state: present

    - name: Show invocation hints
      ansible.builtin.debug:
        msg:
          - "List snapshots: sudo cachyos-list-snapshots"
          - "Recover (live USB only): sudo cachyos-recover"
